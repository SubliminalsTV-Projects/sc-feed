<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 320px; margin: 0; padding: 12px; font: 13px/1.5 system-ui, sans-serif; background: #1b1c1c; color: #e3e2e2; }
    h1 { font-size: 13px; margin: 0 0 8px; display: flex; align-items: center; justify-content: space-between; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .ok { background: #4ade80; } .err { background: #f87171; } .idle { background: #d6c4ae; }
    .status { font-size: 11px; color: #d6c4ae; margin-bottom: 10px; }
    .feed { max-height: 230px; overflow-y: auto; border: 1px solid #524534; border-radius: 8px; }
    .item { display: block; padding: 7px 9px; border-bottom: 1px solid #2a2a2a; color: #e3e2e2; text-decoration: none; cursor: pointer; }
    .item:last-child { border-bottom: 0; }
    .item:hover { background: #292a2a; }
    .item .t { font-size: 12px; font-weight: 600; line-height: 1.3; }
    .item .m { font-size: 10px; color: #d6c4ae; opacity: .7; margin-top: 1px; }
    .empty { padding: 14px; text-align: center; font-size: 11px; color: #d6c4ae; opacity: .6; }
    .row { display: flex; gap: 8px; margin-top: 10px; }
    button { flex: 1; padding: 7px; border-radius: 6px; border: 1px solid #524534; background: #292a2a; color: #e3e2e2; font-weight: 600; font-size: 12px; cursor: pointer; }
    button.primary { background: #ffb231; color: #3a2600; border-color: #ffb231; }
    details { margin-top: 10px; border-top: 1px solid #2a2a2a; padding-top: 8px; }
    summary { font-size: 11px; color: #d6c4ae; cursor: pointer; }
    label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: #d6c4ae; margin: 8px 0 3px; }
    input[type=text], input[type=password] { width: 100%; box-sizing: border-box; padding: 6px 8px; border-radius: 6px; border: 1px solid #524534; background: #121414; color: #e3e2e2; font-size: 12px; }
    .chk { display: flex; align-items: center; gap: 6px; margin-top: 8px; font-size: 11px; color: #d6c4ae; }
  </style>
</head>
<body>
  <h1>SC Feed <span id="tok" class="status" style="margin:0"></span></h1>

  <div id="feed" class="feed"><div class="empty">Loading…</div></div>

  <div class="row">
    <button id="open" class="primary">Open SC Feed</button>
    <button id="capture">Capture window</button>
  </div>

  <details id="cfg">
    <summary>Settings</summary>
    <label for="feedUrl">SC Feed URL</label>
    <input id="feedUrl" type="text" placeholder="https://sc-feed.subliminal.gg" />
    <label for="endpoint">Token push endpoint</label>
    <input id="endpoint" type="text" placeholder="https://sc-feed.subliminal.gg/api/owner/rsi-token" />
    <label for="secret">Push secret</label>
    <input id="secret" type="password" placeholder="OWNER_PUSH_SECRET" />
    <label class="chk"><input id="notify" type="checkbox" /> Desktop notifications for new items</label>
    <div class="row">
      <button id="save">Save</button>
      <button id="push">Push token now</button>
    </div>
    <div id="msg" class="status" style="margin-top:8px"></div>
  </details>
  <script src="popup.js"></script>
</body>
</html>

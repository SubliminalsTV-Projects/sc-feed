<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 280px; margin: 0; padding: 14px; font: 13px/1.5 system-ui, sans-serif; background: #1b1c1c; color: #e3e2e2; }
    h1 { font-size: 14px; margin: 0 0 10px; }
    label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: #d6c4ae; margin: 10px 0 3px; }
    input { width: 100%; box-sizing: border-box; padding: 6px 8px; border-radius: 6px; border: 1px solid #524534; background: #121414; color: #e3e2e2; font-size: 12px; }
    .row { display: flex; gap: 8px; margin-top: 12px; }
    button { flex: 1; padding: 7px; border-radius: 6px; border: 1px solid #524534; background: #292a2a; color: #e3e2e2; font-weight: 600; cursor: pointer; }
    button.primary { background: #ffb231; color: #3a2600; border-color: #ffb231; }
    #status { margin-top: 12px; font-size: 12px; padding: 7px 9px; border-radius: 6px; background: #121414; }
    .ok { color: #4ade80; } .err { color: #f87171; } .muted { color: #d6c4ae; opacity: .7; }
  </style>
</head>
<body>
  <h1>SC Feed — RSI Token Sync</h1>
  <label for="endpoint">Endpoint</label>
  <input id="endpoint" type="text" placeholder="https://sc-feed.subliminal.gg/api/owner/rsi-token" />
  <label for="secret">Push secret (optional if signed in as owner)</label>
  <input id="secret" type="password" placeholder="OWNER_PUSH_SECRET" />
  <div class="row">
    <button id="save">Save</button>
    <button id="push" class="primary">Push now</button>
  </div>
  <div id="status" class="muted">Loading…</div>
  <script src="popup.js"></script>
</body>
</html>
